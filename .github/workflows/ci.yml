name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Self-lint repository
        run: node dist/cli.js .
      - name: Run tests
        run: npm test

      - name: CLI smoke test
        run: |
          node dist/cli.js --version
          node dist/cli.js --help
          # Use a guaranteed-clean temporary directory for smoke (avoids self-doc false positives in README)
          mkdir -p /tmp/acl-smoke
          cp examples/clean-AGENTS.md /tmp/acl-smoke/AGENTS.md
          echo -e "# README\n\nInstall: npm install\nTest: npm test\nLint: npm run lint" > /tmp/acl-smoke/README.md
          node dist/cli.js /tmp/acl-smoke
          rm -rf /tmp/acl-smoke


